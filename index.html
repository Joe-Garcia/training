<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0C1B33">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'sha256-SQHWcWqC5hFZQLfpsJlQe0/RwiAnwuNVM8R16xlnidQ='; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src data:; base-uri 'none'; form-action 'none'">
<title>Mat Strong</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='58' r='34' fill='%23D4A853'/%3E%3Cpath d='M32 34 a18 18 0 0 1 36 0 l-7 0 a11 11 0 0 0 -22 0 z' fill='%23D4A853'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --midnight:#0C1B33; --midnight-light:#132744; --midnight-lighter:#1A3355; --surface:#0F2240;
  --gold:#D4A853; --gold-light:#E8C97A; --gold-dim:#B8923F; --gold-glow:rgba(212,168,83,.15);
  --text-primary:#E8E0D4; --text-secondary:#A8A08E; --text-dim:#756E60; --text-bright:#FFF;
  --surface-border:rgba(212,168,83,.12); --surface-hover:rgba(212,168,83,.08); --divider:rgba(232,224,212,.1);
  --positive:#4ADE80; --negative:#F87171; --warning:#FBBF24; --info:#60A5FA;
  --font-body:'Lora','Georgia',serif; --font-ui:'Inter',system-ui,sans-serif;
  --radius:6px; --radius-lg:10px; --transition:200ms ease;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--midnight);color:var(--text-primary);font-family:var(--font-ui);font-size:16px;line-height:1.55;min-height:100dvh}
button{font-family:var(--font-ui);color:inherit;background:none;border:none;cursor:pointer;font-size:inherit}
button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
a{color:var(--gold);text-decoration:none}
[hidden]{display:none!important}

/* ── unlock ── */
#lock{position:fixed;inset:0;background:var(--midnight);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:2rem;z-index:50}
#lock .mark{font-size:2.6rem;line-height:1}
#lock h1{font-family:var(--font-body);font-weight:600;font-size:1.5rem;color:var(--gold);letter-spacing:.02em}
#lock p{color:var(--text-secondary);font-size:.9rem;text-align:center;max-width:22rem}
#lock form{display:flex;flex-direction:column;gap:.75rem;width:100%;max-width:20rem;margin-top:.5rem}
#pw{background:var(--midnight-light);border:1px solid var(--surface-border);border-radius:var(--radius);color:var(--text-primary);font-size:1.1rem;padding:.8rem 1rem;width:100%;text-align:center;letter-spacing:.05em}
#pw:focus{border-color:var(--gold);outline:none}
#lock button{background:var(--gold);color:var(--midnight);font-weight:600;padding:.8rem;border-radius:var(--radius);transition:var(--transition);min-height:48px}
#lock button:hover{background:var(--gold-light)}
#lock button:disabled{opacity:.6}
#lockerr{color:var(--negative);font-size:.85rem;min-height:1.2em;text-align:center}

/* ── shell ── */
#app{max-width:640px;margin:0 auto;padding:0 1rem calc(76px + env(safe-area-inset-bottom));min-height:100dvh}
header.top{display:flex;align-items:center;justify-content:space-between;padding:1.1rem .1rem .4rem}
header.top .date{color:var(--text-secondary);font-size:.8rem;letter-spacing:.06em;text-transform:uppercase}
header.top h1{font-family:var(--font-body);font-size:1.45rem;font-weight:600;line-height:1.25;margin-top:.15rem}
header.top .sub{color:var(--text-secondary);font-size:.85rem;margin-top:.2rem}
.ring{position:relative;width:52px;height:52px;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring .bg{stroke:var(--midnight-lighter)}
.ring .fg{stroke:var(--gold);transition:stroke-dashoffset .4s ease}
.ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:600;color:var(--gold)}

nav.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(12,27,51,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--divider);display:flex;justify-content:center;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
nav.tabs .in{display:flex;width:100%;max-width:640px}
nav.tabs button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:.55rem 0 .5rem;color:var(--text-dim);font-size:.66rem;font-weight:500;min-height:56px;transition:color var(--transition)}
nav.tabs button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
nav.tabs button.on{color:var(--gold)}
nav.tabs button[aria-current="true"]{color:var(--gold)}

/* ── week strip ── */
.week{display:flex;gap:6px;margin:.7rem 0 1rem}
.week .d{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:.45rem 0;border-radius:var(--radius);background:var(--surface);border:1px solid transparent;color:var(--text-dim);font-size:.7rem}
.week .d .l{font-weight:600}
.week .d .s{font-size:.6rem}
.week .d.today{border-color:var(--gold);color:var(--gold)}
.week .d.done{color:var(--positive)}
.week .d.part{color:var(--gold-dim)}

/* ── checklist ── */
.sec{margin:1.1rem 0 .4rem;display:flex;align-items:baseline;justify-content:space-between}
.sec h2{font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-secondary)}
.sec .tag{font-size:.7rem;color:var(--text-dim)}
ul.list{list-style:none;display:flex;flex-direction:column;gap:.5rem}
.item{display:flex;align-items:stretch;background:var(--surface);border:1px solid var(--surface-border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color var(--transition)}
.item.done{border-color:rgba(74,222,128,.25)}
.item.done .nm{color:var(--text-dim);text-decoration:line-through;text-decoration-color:rgba(117,110,96,.6)}
.chk{display:flex;align-items:center;padding:0 .35rem 0 .85rem;flex-shrink:0}
.chk .c{width:26px;height:26px;border-radius:50%;border:2px solid var(--text-dim);display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.item.done .chk .c{background:var(--positive);border-color:var(--positive)}
.chk svg{width:15px;height:15px;stroke:var(--midnight);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0}
.item.done .chk svg{opacity:1}
.itxt{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:left;padding:.7rem .2rem .7rem .5rem;min-height:56px}
.itxt .nm{font-weight:500;font-size:.95rem}
.itxt .ds{color:var(--text-secondary);font-size:.8rem;margin-top:1px}
.ichev{display:flex;align-items:center;padding:0 .9rem;color:var(--text-dim)}
.ichev svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round}
.opt .nm::after{content:"optional";font-size:.62rem;font-weight:600;letter-spacing:.05em;color:var(--gold-dim);border:1px solid var(--gold-dim);border-radius:99px;padding:1px 7px;margin-left:.5rem;vertical-align:1px}

/* ── cards & callouts (content blocks) ── */
.blocks{display:flex;flex-direction:column;gap:.65rem;padding-bottom:1rem}
.blocks h3{font-family:var(--font-body);font-size:1.1rem;font-weight:600;color:var(--gold);margin-top:.9rem}
.blocks p{font-family:var(--font-body);font-size:.95rem;line-height:1.7;color:var(--text-primary)}
.blocks ul{padding-left:1.15rem;display:flex;flex-direction:column;gap:.35rem}
.blocks li{font-family:var(--font-body);font-size:.93rem;line-height:1.6}
.call{border-radius:var(--radius-lg);padding:.8rem 1rem;font-size:.88rem;line-height:1.6;border:1px solid}
.call.info{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.3);color:#BFDBFE}
.call.warn{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.3);color:#FDE68A}
.call.danger{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.35);color:#FECACA}
.tbl{overflow-x:auto;border:1px solid var(--surface-border);border-radius:var(--radius-lg)}
.tbl table{border-collapse:collapse;width:100%;font-size:.82rem}
.tbl th{text-align:left;color:var(--gold);font-weight:600;padding:.6rem .7rem;border-bottom:1px solid var(--divider);white-space:nowrap}
.tbl td{padding:.55rem .7rem;border-bottom:1px solid var(--divider);vertical-align:top;color:var(--text-primary)}
.tbl tr:last-child td{border-bottom:none}
.xcard{background:var(--surface);border:1px solid var(--surface-border);border-radius:var(--radius-lg)}
.xcard>button{width:100%;display:flex;align-items:center;gap:.6rem;text-align:left;padding:.85rem 1rem;min-height:52px}
.xcard .xt{flex:1}
.xcard .xt .t{font-weight:500;font-size:.95rem}
.xcard .xt .s{color:var(--text-secondary);font-size:.8rem;margin-top:1px}
.xcard .xc{color:var(--text-dim);transition:transform var(--transition)}
.xcard.open .xc{transform:rotate(180deg)}
.xcard .xb{display:none;padding:.2rem 1rem 1rem;border-top:1px solid var(--divider)}
.xcard.open .xb{display:block}
.xcard .xb .blocks{gap:.55rem;padding-bottom:0;padding-top:.6rem}

/* ── chips ── */
.chips{display:flex;gap:.5rem;overflow-x:auto;padding:.85rem 0 .9rem;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chips button{flex-shrink:0;background:var(--surface);border:1px solid var(--surface-border);color:var(--text-secondary);border-radius:99px;padding:.42rem .95rem;font-size:.82rem;font-weight:500;min-height:36px;transition:var(--transition)}
.chips button.on{background:var(--gold);border-color:var(--gold);color:var(--midnight);font-weight:600}

/* ── focus card / notice ── */
.focus{background:var(--gold-glow);border:1px solid var(--surface-border);border-radius:var(--radius-lg);padding:.85rem 1rem;margin-top:.6rem}
.focus .k{color:var(--gold);font-size:.72rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase}
.focus .v{font-size:.88rem;margin-top:.25rem;line-height:1.55}
.focus button{color:var(--gold);font-weight:600;font-size:.85rem;padding:.35rem 0}
.ghost{width:100%;background:var(--surface);border:1px dashed var(--surface-border);border-radius:var(--radius-lg);color:var(--text-secondary);padding:.7rem 1rem;font-size:.85rem;margin-top:.9rem;min-height:48px;transition:var(--transition)}
.ghost:hover{background:var(--surface-hover)}
.ghost.on{border-style:solid;border-color:var(--gold-dim);color:var(--gold)}

/* ── sheet ── */
#shade{position:fixed;inset:0;background:rgba(4,10,20,.6);z-index:40;opacity:0;pointer-events:none;transition:opacity .25s ease}
#shade.on{opacity:1;pointer-events:auto}
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:45;background:var(--midnight-light);border-radius:16px 16px 0 0;border-top:1px solid var(--surface-border);max-height:86dvh;overflow-y:auto;transform:translateY(102%);transition:transform .28s cubic-bezier(.32,.72,.28,1);padding:0 1.15rem calc(1.2rem + env(safe-area-inset-bottom))}
#sheet.on{transform:translateY(0)}
#sheet .grab{position:sticky;top:0;background:var(--midnight-light);padding:.6rem 0 .4rem;display:flex;justify-content:center}
#sheet .grab i{width:38px;height:4px;border-radius:2px;background:var(--text-dim);display:block}
#sheet .shead{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin:.3rem 0 .2rem}
#sheet h2{font-family:var(--font-body);font-size:1.3rem;font-weight:600;color:var(--gold)}
#sheet .dose{color:var(--text-secondary);font-size:.85rem;margin-top:.15rem}
#sheet .why{font-family:var(--font-body);font-style:italic;color:var(--text-secondary);font-size:.9rem;line-height:1.6;margin:.6rem 0}
#sheet ol{padding-left:1.3rem;display:flex;flex-direction:column;gap:.5rem;margin:.6rem 0}
#sheet ol li{font-size:.92rem;line-height:1.6}
#sheet ol li::marker{color:var(--gold);font-weight:600}
.cuewrap{display:flex;flex-wrap:wrap;gap:.45rem;margin:.7rem 0}
.cue{background:var(--midnight-lighter);border:1px solid var(--surface-border);color:var(--text-primary);border-radius:99px;padding:.3rem .8rem;font-size:.78rem}
#sheet .swap{color:var(--text-secondary);font-size:.85rem;margin:.6rem 0;padding-left:.75rem;border-left:2px solid var(--gold-dim)}
.srow{display:flex;gap:.6rem;margin-top:1rem}
.srow a,.srow button{flex:1;display:flex;align-items:center;justify-content:center;gap:.5rem;border-radius:var(--radius);padding:.75rem;font-weight:600;font-size:.9rem;min-height:48px;transition:var(--transition)}
.srow a{background:var(--midnight-lighter);border:1px solid var(--surface-border);color:var(--text-primary)}
.srow a:hover{background:var(--surface-hover)}
.srow button{background:var(--gold);color:var(--midnight);border:none}
.srow button:hover{background:var(--gold-light)}
.srow button.undone{background:var(--midnight-lighter);color:var(--text-secondary);border:1px solid var(--surface-border)}
.srow svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ── history ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin:.9rem 0}
.stat{background:var(--surface);border:1px solid var(--surface-border);border-radius:var(--radius-lg);padding:.8rem 1rem}
.stat .k{color:var(--text-secondary);font-size:.72rem;letter-spacing:.05em;text-transform:uppercase}
.stat .v{font-size:1.5rem;font-weight:600;color:var(--gold);margin-top:.15rem}
.stat .v small{font-size:.8rem;color:var(--text-secondary);font-weight:400}
.calhead{display:flex;align-items:center;justify-content:space-between;margin:1rem 0 .5rem}
.calhead .m{font-weight:600;font-size:.95rem}
.calhead button{color:var(--text-secondary);padding:.4rem .8rem;font-size:1rem;min-width:44px;min-height:44px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal .h{text-align:center;color:var(--text-dim);font-size:.65rem;font-weight:600;padding:.25rem 0}
.cal .c{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);font-size:.78rem;color:var(--text-secondary);background:var(--surface)}
.cal .c.mt{background:none}
.cal .c.full{background:rgba(74,222,128,.18);color:var(--positive);font-weight:600}
.cal .c.part{background:var(--gold-glow);color:var(--gold)}
.cal .c.today{outline:1.5px solid var(--gold)}
.cal .c.future{opacity:.35;background:none}
.bform{background:var(--surface);border:1px solid var(--surface-border);border-radius:var(--radius-lg);padding:1rem;margin-top:.6rem}
.bform h3{font-size:.9rem;font-weight:600;margin-bottom:.2rem}
.bform p{color:var(--text-secondary);font-size:.78rem;margin-bottom:.7rem}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.bgrid label{display:flex;flex-direction:column;gap:.25rem;font-size:.72rem;color:var(--text-secondary)}
.bgrid input{background:var(--midnight-light);border:1px solid var(--surface-border);border-radius:var(--radius);color:var(--text-primary);padding:.55rem .7rem;font-size:.95rem;width:100%;min-height:44px}
.bgrid input:focus{border-color:var(--gold);outline:none}
.bform>button{margin-top:.8rem;width:100%;background:var(--gold);color:var(--midnight);font-weight:600;border-radius:var(--radius);padding:.7rem;min-height:48px}
.bhist{margin-top:.8rem;display:flex;flex-direction:column;gap:.4rem}
.bhist .row{display:flex;justify-content:space-between;font-size:.78rem;color:var(--text-secondary);border-bottom:1px solid var(--divider);padding-bottom:.35rem;gap:.6rem;flex-wrap:wrap}
/* ── analytics ── */
.chartcard{background:var(--surface);border:1px solid var(--surface-border);border-radius:var(--radius-lg);padding:.85rem 1rem;margin:.6rem 0}
.chartcard .ch{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.55rem}
.chartcard .ch span{font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary)}
.chartcard .ch .v{color:var(--gold);text-transform:none;letter-spacing:0;font-size:.95rem}
.chartcard .ch .v small{color:var(--text-dim);font-weight:400;font-size:.72rem}
.chartcard svg{display:block;width:100%;height:auto}
.arow,.brow{display:flex;align-items:center;gap:.6rem;margin:.45rem 0}
.arow .al,.brow .al{flex:0 0 8.2rem;font-size:.78rem;color:var(--text-secondary)}
.arow .ab{flex:1;height:8px;background:var(--midnight-lighter);border-radius:99px;overflow:hidden}
.arow .ab i{display:block;height:100%;background:var(--gold);border-radius:99px}
.arow .ap,.brow .ap{flex:0 0 auto;font-size:.78rem;color:var(--text-primary);min-width:2.6rem;text-align:right}
.brow .spark{flex:1;height:26px}
.quiet{color:var(--text-secondary);font-size:.82rem;line-height:1.6;margin:.5rem .15rem}
.util{display:flex;gap:.6rem;margin:1.2rem 0 .6rem}
.util button{flex:1;background:var(--surface);border:1px solid var(--surface-border);color:var(--text-secondary);border-radius:var(--radius);padding:.65rem;font-size:.82rem;font-weight:500;min-height:48px;transition:var(--transition)}
.util button:hover{background:var(--surface-hover);color:var(--text-primary)}
.foot{text-align:center;color:var(--text-dim);font-size:.72rem;padding:1rem 0 .6rem}
.banner{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#FDE68A;border-radius:var(--radius);font-size:.8rem;padding:.6rem .9rem;margin:.6rem 0}
@media(min-width:768px){#app{padding-top:.5rem} header.top h1{font-size:1.7rem}}
</style>
</head>
<body>

<div id="lock">
  <div class="mark" aria-hidden="true">🥋</div>
  <h1>Mat Strong</h1>
  <p>Your training. Enter the password to unlock.</p>
  <form id="lockform">
    <input id="pw" type="password" autocomplete="current-password" placeholder="Password" aria-label="Password" required>
    <button id="unlockbtn" type="submit">Unlock</button>
    <div id="lockerr" role="alert"></div>
  </form>
</div>

<div id="app" hidden>
  <header class="top">
    <div>
      <div class="date" id="hdate"></div>
      <h1 id="htitle"></h1>
      <div class="sub" id="hsub"></div>
    </div>
    <div class="ring" id="ring" hidden>
      <svg width="52" height="52" viewBox="0 0 52 52">
        <circle class="bg" cx="26" cy="26" r="22" fill="none" stroke-width="4"/>
        <circle class="fg" id="ringfg" cx="26" cy="26" r="22" fill="none" stroke-width="4" stroke-linecap="round" stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
      </svg>
      <div class="num" id="ringnum"></div>
    </div>
  </header>
  <main id="view"></main>
  <nav class="tabs" aria-label="Sections"><div class="in" id="tabbar"></div></nav>
</div>

<div id="shade"></div>
<div id="sheet" role="dialog" aria-modal="true" aria-label="Exercise guide" aria-hidden="true"></div>

<noscript><p style="padding:2rem;text-align:center">Mat Strong needs JavaScript to decrypt and show your training.</p></noscript>

/* ───────────────────────── storage (safe) ───────────────────────── */
const mem = {};
const store = {
  get(k){ try { return localStorage.getItem(k); } catch(e){ return mem[k] ?? null; } },
  set(k,v){ try { localStorage.setItem(k,v); } catch(e){ mem[k]=v; } },
  del(k){ try { localStorage.removeItem(k); } catch(e){ delete mem[k]; } },
  ok(){ try { localStorage.setItem('ms.t','1'); localStorage.removeItem('ms.t'); return true; } catch(e){ return false; } }
};
const J = { get(k,f){ const v=store.get(k); if(!v) return f; try{ return JSON.parse(v); }catch(e){ return f; } }, set(k,v){ store.set(k,JSON.stringify(v)); } };

/* ───────────────────────── crypto ───────────────────────── */
const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function deriveKey(pw, salt, iter){
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:iter, hash:'SHA-256'}, base, {name:'AES-GCM', length:256}, true, ['decrypt']);
}
async function decryptPayload(key, p){
  const buf = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64d(p.iv)}, key, b64d(p.ct));
  return JSON.parse(new TextDecoder().decode(buf));
}
async function unlockWithPassword(pw){
  const p = JSON.parse(atob(PAYLOAD));
  const key = await deriveKey(pw, b64d(p.salt), p.iter);
  const content = await decryptPayload(key, p);            // throws on wrong pw (GCM auth)
  const jwk = await crypto.subtle.exportKey('jwk', key);
  J.set('ms.key', jwk);
  return content;
}
async function unlockWithCachedKey(){
  const jwk = J.get('ms.key', null);
  if(!jwk) return null;
  try {
    const key = await crypto.subtle.importKey('jwk', jwk, {name:'AES-GCM'}, false, ['decrypt']);
    return await decryptPayload(key, JSON.parse(atob(PAYLOAD)));
  } catch(e){ store.del('ms.key'); return null; }
}

/* ───────────────────────── date helpers ───────────────────────── */
const DAYKEYS = ['sun','mon','tue','wed','thu','fri','sat'];
const pad = n => String(n).padStart(2,'0');
const dstr = d => d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
function todayDate(){
  const q = new URLSearchParams(location.search).get('d');
  if(q && /^\d{4}-\d{2}-\d{2}$/.test(q)) return new Date(q+'T12:00:00');
  return new Date();
}
const fromStr = s => new Date(s+'T12:00:00');
const addDays = (d,n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const FMT = new Intl.DateTimeFormat('en-US',{weekday:'long', month:'short', day:'numeric'});

/* ───────────────────────── state ───────────────────────── */
let C = null;                 // decrypted content
let tab = 'today';
const secState = {};          // active chip per tab
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const md = s => esc(s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');

/* ── attend state ──
   ms.attend: null (evergreen) | {mode:'arc', week:1-8, since} | {mode:'done'} | {mode:'season', pattern, since}
   Arc weeks advance by consent: 7 elapsed days AND an app open. A gap advances at most one week. */
function attendState(today){
  let a = J.get('ms.attend', null);
  if(a && a.mode === 'arc'){
    const days = Math.floor((fromStr(dstr(today)) - fromStr(a.since)) / 864e5);
    if(days >= 7){
      a = a.week >= 8 ? {mode:'done'} : {mode:'arc', week:a.week + 1, since:dstr(today)};
      J.set('ms.attend', a);
    }
  }
  return a;
}
function attendPattern(a){
  if(a && a.mode === 'arc') return C.attend.patterns[a.week - 1];
  if(a && a.mode === 'season') return C.attend.patterns.find(p => p.key === a.pattern) || null;
  return null;
}

const track = () => J.get('ms.track', {});
const dayChecks = ds => track()[ds] || {};
function setCheck(ds, id, on){
  const t = track();
  t[ds] = t[ds] || {};
  if(on) t[ds][id] = 1; else delete t[ds][id];
  if(Object.keys(t[ds]).length === 0) delete t[ds];
  J.set('ms.track', t);
}
const isRough = ds => !!(J.get('ms.rough', {})[ds]);
function setRough(ds, on){ const r = J.get('ms.rough', {}); if(on) r[ds]=1; else delete r[ds]; J.set('ms.rough', r); }

/* build the item list for a given date — single source of truth for render, ring, streak */
function itemsFor(d){
  const dk = DAYKEYS[d.getDay()], ds = dstr(d), w = C.week[dk];
  const sections = [];
  if(isRough(ds) && w.type === 'strength'){
    sections.push({ name:'Floor session', tag: C.floorSession.note, items: C.floorSession.items.map(it => ({...it, sec:'fs'})) });
  } else {
    sections.push({ name: w.type === 'strength' ? 'Session' : (w.type === 'bjj' ? 'BJJ day' : 'Rest day'), tag: w.sub || '', items: w.items.map(it => ({...it, sec:'w'})) });
  }
  if(dk === 'sun') sections[0].items.push({ ex:'pattern-page', opt:true, sec:'w' });
  sections.push({ name:'Mobility minimum', tag:'every day · low intensity', items: C.mobilityDaily.map(it => ({...it, sec:'m'})) });
  sections.push({ name:'Non-negotiables', tag:'~3 min, every day', items: C.daily.map(it => ({...it, sec:'d'})) });
  sections.push({ name:'Attend', tag:'optional by design — never breaks a streak', items: [{ ex:'attend-rep', sec:'a', opt:true }] });
  sections.push({ name:'If fresh', tag:'never to failure', items: [{...C.pullups, sec:'p', opt:true}] });
  for(const s of sections) for(const it of s.items) it.id = s.name === 'Floor session' ? 'fs.'+it.ex : it.sec+'.'+it.ex;
  return sections;
}
function requiredIds(d){
  const out = [];
  for(const s of itemsFor(d)) for(const it of s.items) if(!it.opt) out.push(it.id);
  return out;
}
function dayStatus(d){
  const ds = dstr(d), ch = dayChecks(ds), n = Object.keys(ch).length;
  if(n === 0) return 'none';
  return requiredIds(d).every(id => ch[id]) ? 'full' : 'part';
}
function streak(today){
  let n = 0, d = today;
  if(dayStatus(d) !== 'full') d = addDays(d,-1);          // today in progress doesn't break it
  while(dayStatus(d) === 'full'){ n++; d = addDays(d,-1); }
  return n;
}

/* ───────────────────────── block renderer ───────────────────────── */
function renderBlocks(blocks){
  let h = '<div class="blocks">';
  for(const b of blocks || []){
    if(b.t === 'h') h += '<h3>'+md(b.x)+'</h3>';
    else if(b.t === 'p') h += '<p>'+md(b.x)+'</p>';
    else if(b.t === 'li') h += '<ul>'+b.x.map(x => '<li>'+md(x)+'</li>').join('')+'</ul>';
    else if(b.t === 'call') h += '<div class="call '+(['info','warn','danger'].includes(b.style) ? b.style : 'info')+'">'+md(b.x)+'</div>';

/* ── analytics (computed on-device from ms.track / ms.bench; Attend is never counted — by design) ── */
function firstTrackedDate(){
  const days = Object.keys(track()).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort();
  return days.length ? fromStr(days[0]) : null;
}
function weekStats(monday, today){
  const out = { req:0, done:0, cats:{ str:[0,0], bjj:[0,0], mob:[0,0], nn:[0,0] } };
  for(let i=0;i<7;i++){
    const d = addDays(monday, i);
    if(d > today) break;
    const ch = dayChecks(dstr(d)), w = C.week[DAYKEYS[d.getDay()]];
    for(const s of itemsFor(d)) for(const it of s.items){
      if(it.opt) continue;
      const cat = it.sec === 'm' ? 'mob' : it.sec === 'd' ? 'nn' : w.type === 'bjj' ? 'bjj' : w.type === 'rest' ? 'mob' : 'str';
      out.req++; out.cats[cat][0]++;
      if(ch[it.id]){ out.done++; out.cats[cat][1]++; }
    }
  }
  return out;
}
function trendsHTML(d){
  const first = firstTrackedDate();
  const tdays = Object.keys(track()).length;
  let h = '<div class="sec"><h2>Trends</h2><span class="tag">computed on this phone</span></div>';
  if(!first || tdays < 7){
    return h + '<p class="quiet">Trends unlock as history accumulates — a couple of weeks in, this section starts talking.</p>';
  }
  const thisMon = addDays(d, -((d.getDay()+6) % 7));
  const firstMon = addDays(first, -((first.getDay()+6) % 7));
  const weeks = [];
  for(let w = 11; w >= 0; w--){
    const mon = addDays(thisMon, -7*w);
    if(mon < firstMon) continue;
    weeks.push({ mon, s: weekStats(mon, d) });
  }
  /* weekly bars */
  const bw = 100 / Math.max(weeks.length, 6);
  let bars = '';
  weeks.forEach((wk, i) => {
    const pct = wk.s.req ? wk.s.done / wk.s.req : 0;
    const x = i * bw + bw*0.15, width = bw*0.7, height = Math.max(pct*34, pct > 0 ? 1.5 : 0);
    const cur = dstr(wk.mon) === dstr(thisMon);
    bars += '<rect x="'+x.toFixed(1)+'" y="'+(36-height).toFixed(1)+'" width="'+width.toFixed(1)+'" height="'+height.toFixed(1)+'" rx="1" fill="var(--gold'+(cur?'-light':'')+')" opacity="'+(cur?'1':'0.75')+'"/>';
    if(cur || i === 0) bars += '<text x="'+(x+width/2).toFixed(1)+'" y="41.5" text-anchor="middle" font-size="3.2" fill="var(--text-dim)">'+(cur?'now':'wk '+dstr(wk.mon).slice(5))+'</text>';
  });
  const curPct = weeks.length ? Math.round((weeks[weeks.length-1].s.done / Math.max(weeks[weeks.length-1].s.req,1))*100) : 0;
  h += '<div class="chartcard"><div class="ch"><span>Weekly completion</span><span class="v">'+curPct+'% <small>this week</small></span></div>'
    + '<svg viewBox="0 0 100 43" preserveAspectRatio="none" aria-label="Weekly completion bars"><line x1="0" y1="36" x2="100" y2="36" stroke="var(--divider)" stroke-width="0.4"/>'+bars+'</svg></div>';

  /* by area, last 4 weeks */
  const last4 = weeks.slice(-4);
  const agg = { str:[0,0], bjj:[0,0], mob:[0,0], nn:[0,0] };
  for(const wk of last4) for(const k of Object.keys(agg)){ agg[k][0] += wk.s.cats[k][0]; agg[k][1] += wk.s.cats[k][1]; }
  const LBL = { str:'Strength days', bjj:'BJJ days', mob:'Mobility', nn:'Non-negotiables' };
  h += '<div class="chartcard"><div class="ch"><span>By area</span><span class="v"><small>last 4 weeks</small></span></div>';
  for(const k of ['str','bjj','mob','nn']){
    const [req, done] = agg[k];
    if(!req) continue;
    const pct = Math.round(done/req*100);
    h += '<div class="arow"><span class="al">'+LBL[k]+'</span><span class="ab"><i style="width:'+pct+'%"></i></span><span class="ap">'+pct+'%</span></div>';
  }
  h += '</div>';

  /* weekday pattern + floor sessions (≥3 weeks of data) */
  if((d - first) / 864e5 >= 21){
    const rates = [];
    for(let wd = 0; wd < 7; wd++){
      let full = 0, n = 0;
      for(let back = 0; back < 56; back++){
        const dd = addDays(d, -back);
        if(dd < first || dd.getDay() !== (wd+1) % 7) continue;
        if(dstr(dd) === dstr(d)) continue;
        n++; if(dayStatus(dd) === 'full') full++;
      }
      if(n >= 2) rates.push({ wd, pct: Math.round(full/n*100) });
    }
    if(rates.length >= 4){
      const NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
      const best = rates.reduce((a,b) => b.pct > a.pct ? b : a), worst = rates.reduce((a,b) => b.pct < a.pct ? b : a);
      if(best.pct !== worst.pct) h += '<p class="quiet">Strongest day: <strong>'+NAMES[best.wd]+'</strong> ('+best.pct+'% complete) · toughest: <strong>'+NAMES[worst.wd]+'</strong> ('+worst.pct+'%).</p>';
    }
    const rough = J.get('ms.rough', {});
    const rc = Object.keys(rough).filter(ds => (d - fromStr(ds))/864e5 <= 28 && dayChecks(ds)['fs.floor-session']).length;
    if(rc) h += '<p class="quiet">Floor sessions used (4 wks): <strong>'+rc+'</strong> — rough nights where showing up still counted.</p>';
  }
  return h;
}
function sparkHTML(vals){
  const min = Math.min(...vals), max = Math.max(...vals), span = max - min || 1;
  const pts = vals.map((v, i) => (vals.length === 1 ? 50 : i/(vals.length-1)*94 + 3).toFixed(1) + ',' + (23 - (v-min)/span*18).toFixed(1)).join(' ');
  const last = pts.split(' ').pop().split(',');
  return '<svg viewBox="0 0 100 26" preserveAspectRatio="none" class="spark" aria-hidden="true"><polyline points="'+pts+'" fill="none" stroke="var(--gold)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+last[0]+'" cy="'+last[1]+'" r="2.2" fill="var(--gold-light)"/></svg>';
}
function benchTrendsHTML(){
  const bench = J.get('ms.bench', []);
  let h = '';
  for(const b of C.benchmarks){
    const pts = bench.map(e => ({ d: e.date, v: parseFloat(e[b.id]) })).filter(p => p.d && !isNaN(p.v));
    if(pts.length < 2) continue;
    pts.sort((a,z) => a.d < z.d ? -1 : 1);
    const f = pts[0].v, l = pts[pts.length-1].v;
    const dir = l > f ? '↑' : l < f ? '↓' : '→';
    h += '<div class="brow"><span class="al">'+esc(b.label)+'</span>'+sparkHTML(pts.map(p=>p.v))+'<span class="ap">'+esc(String(f))+' → <strong>'+esc(String(l))+'</strong> '+dir+'</span></div>';
  }
  return h ? '<div class="chartcard"><div class="ch"><span>Benchmark trends</span><span class="v"><small>'+bench.length+' entries</small></span></div>'+h+'</div>' : '';
}

    h += '</div>';
  }

  h += '<div class="util"><button data-export>Export backup</button><button data-import>Import backup</button><button data-lock>Lock</button></div>';
  h += '<input type="file" id="importfile" accept="application/json" hidden>';
  h += '<div class="foot">Data lives on this device only. Export a backup now and then.</div>';

    const pat = attendPattern(attendState(todayDate()));
    const qs = pat ? pat.sundayQs : [C.attend.patterns[0].sundayQs[0], 'How do I enjoy this season of life 10% more?'];
    h += '<div class="focus"><div class="k">'+(pat ? 'This week · '+esc(pat.title) : 'Evergreen')+'</div><div class="v">'+qs.map(q=>md(q)).join('<br>')+'</div></div>';
  }
  if(exid === 'attend-rep'){
    const d0 = todayDate(), pat0 = attendPattern(attendState(d0));
    const line = pat0 ? C.attend.prompts[pat0.key][DAYKEYS[d0.getDay()]] : C.attend.prompts.ev[DAYKEYS[d0.getDay()]];
    h += '<div class="focus"><div class="k">'+(pat0 ? esc(pat0.title) : 'Evergreen')+' · today</div><div class="v">'+md(line)+'</div></div>';
  }
  if(ex.cues && ex.cues.length) h += '<div class="cuewrap">'+ex.cues.map(c=>'<span class="cue">'+esc(c)+'</span>').join('')+'</div>';
  if(ex.stop) h += '<div class="call danger"><strong>Your stop signals:</strong> '+md(ex.stop)+'</div>';
  if(ex.swap) h += '<div class="swap">'+md(ex.swap)+'</div>';
  h += '<div class="srow">';
  if(ex.video) h += '<a href="https://www.youtube.com/results?search_query='+encodeURIComponent(ex.video)+'" target="_blank" rel="noopener noreferrer">'+I.play+' Watch</a>';
  if(checkId) h += '<button data-sheetdone class="'+(done?'undone':'')+'">'+(done?'Undo':I.check+' Mark done')+'</button>';
  h += '</div>';
  const el = document.getElementById('sheet');
  el.innerHTML = h;
  el.classList.add('on');
  el.setAttribute('aria-hidden', 'false');
  document.getElementById('shade').classList.add('on');
}
function closeSheet(){
  const el = document.getElementById('sheet');
  el.classList.remove('on');
  el.setAttribute('aria-hidden', 'true');
  document.getElementById('shade').classList.remove('on');
  sheetCheckId = null;
}

/* ───────────────────────── render loop ───────────────────────── */
const TABS = [
  {key:'today', label:'Today', icon:I.today},
  {key:'program', label:'Program', icon:I.program},
  {key:'mobility', label:'Mobility', icon:I.mobility},
  {key:'bjj', label:'BJJ', icon:I.bjj},
  {key:'attend', label:'Attend', icon:I.attend},
  {key:'history', label:'History', icon:I.history},
];
function render(){
  const view = document.getElementById('view');
  if(tab === 'today') view.innerHTML = viewToday();
  else if(tab === 'program') view.innerHTML = viewProgram();
  else if(tab === 'mobility') view.innerHTML = viewMobility();
  else if(tab === 'bjj') view.innerHTML = viewBJJ();
  else if(tab === 'attend') view.innerHTML = viewAttend();
  else view.innerHTML = viewHistory();
  if(tab === 'today') updateRing(todayDate());
  document.getElementById('tabbar').innerHTML = TABS.map(t =>
    '<button data-tab="'+t.key+'" aria-current="'+(t.key===tab)+'" class="'+(t.key===tab?'on':'')+'">'+t.icon+'<span>'+t.label+'</span></button>').join('');
}

/* ───────────────────────── events (delegated) ───────────────────────── */
document.addEventListener('click', e => {
  const el = t => e.target.closest(t);
  let b;
  if(b = el('[data-tab]')){ tab = b.dataset.tab; render(); window.scrollTo(0,0); return; }
  if(b = el('[data-check]')){
    const ds = dstr(todayDate()), id = b.dataset.check, on = !(dayChecks(ds)[id]);
    setCheck(ds, id, on); render(); return;
  }
  if(b = el('[data-sheet]')){ openSheet(b.dataset.sheet, b.dataset.id || null); return; }
  if(b = el('[data-sheetdone]')){
    if(sheetCheckId){ const ds = dstr(todayDate()); setCheck(ds, sheetCheckId, !dayChecks(ds)[sheetCheckId]); }
    closeSheet(); render(); return;
  }
  if(el('#shade')){ closeSheet(); return; }
  if(b = el('[data-xcard]')){ const c = b.closest('.xcard'); c.classList.toggle('open'); b.setAttribute('aria-expanded', c.classList.contains('open')); return; }
  if(b = el('[data-chip]')){ const [tk, sk] = b.dataset.chip.split(':'); secState[tk] = sk; render(); return; }
  if(b = el('[data-goto]')){ tab = b.dataset.goto; render(); window.scrollTo(0,0); return; }
  if(b = el('[data-rough]')){ setRough(b.dataset.rough, !isRough(b.dataset.rough)); render(); return; }
  if(b = el('[data-startblock]')){ J.set('ms.block', {n:+b.dataset.startblock, start:dstr(todayDate())}); render(); return; }
  if(el('[data-stopblock]')){ store.del('ms.block'); render(); return; }
  if(el('[data-attend-begin]')){ J.set('ms.attend', {mode:'arc', week:1, since:dstr(todayDate())}); render(); return; }
  if(el('[data-attend-stay]')){
    const a = J.get('ms.attend', null);
    if(a && a.mode === 'arc'){ a.since = dstr(todayDate()); J.set('ms.attend', a); }
    render(); return;
  }
  if(b = el('[data-attend-season]')){ J.set('ms.attend', {mode:'season', pattern:b.dataset.attendSeason, since:dstr(todayDate())}); render(); return; }
  if(b = el('[data-cal]')){
    const cur = secState.calMonth ? fromStr(secState.calMonth) : todayDate();
    const nxt = new Date(cur.getFullYear(), cur.getMonth()+(+b.dataset.cal), 15, 12);
    secState.calMonth = dstr(nxt); render(); return;
  }
  if(el('[data-benchsave]')){
    const entry = { date: dstr(todayDate()) };
    let any = false;
    document.querySelectorAll('[data-bench]').forEach(inp => { if(inp.value.trim()){ entry[inp.dataset.bench] = inp.value.trim(); any = true; } });
    if(any){ const bench = J.get('ms.bench', []); bench.push(entry); J.set('ms.bench', bench); render(); }
    return;
  }
  if(el('[data-export]')){
    const blob = new Blob([JSON.stringify({v:1, exported:dstr(todayDate()), track:track(), rough:J.get('ms.rough',{}), block:J.get('ms.block',null), bench:J.get('ms.bench',[])}, null, 1)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'mat-strong-backup-'+dstr(todayDate())+'.json';
    a.click(); URL.revokeObjectURL(a.href);
    store.set('ms.lastExport', dstr(todayDate()));
    render();
    return;
  }
  if(el('[data-import]')){ document.getElementById('importfile').click(); return; }
  if(el('[data-lock]')){ store.del('ms.key'); location.reload(); return; }
});
/* validate-then-persist: the backup file is the app's only untrusted input */
const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;
function importData(d){
  const isObj = v => v && typeof v === 'object' && !Array.isArray(v);
  if(!isObj(d)) return false;
  const out = {};
  if(isObj(d.track)){
    const t = {};
    for(const [k, v] of Object.entries(d.track)){
      if(!DATE_RE.test(k) || !isObj(v)) continue;
      const day = {};
      for(const id of Object.keys(v)) if(typeof id === 'string' && id.length < 64) day[id] = 1;
      if(Object.keys(day).length) t[k] = day;
    }
    out.track = t;
  }
  if(isObj(d.rough)){
    const rr = {};
    for(const k of Object.keys(d.rough)) if(DATE_RE.test(k)) rr[k] = 1;
    out.rough = rr;
  }
  if(isObj(d.block) && [1, 2, 3].includes(d.block.n) && typeof d.block.start === 'string' && DATE_RE.test(d.block.start)) out.block = { n: d.block.n, start: d.block.start };
  if(Array.isArray(d.bench)){
    out.bench = d.bench.filter(isObj).map(e => {
      const o = {};
      for(const [k, v] of Object.entries(e)) if((typeof v === 'string' || typeof v === 'number') && k.length < 32) o[k] = String(v).slice(0, 40);
      return o;
    }).filter(e => DATE_RE.test(e.date || ''));
  }
  if(!out.track && !out.block && !(out.bench && out.bench.length)) return false;
  if(out.track) J.set('ms.track', out.track);
  if(out.rough) J.set('ms.rough', out.rough);
  if(out.block) J.set('ms.block', out.block);
  if(out.bench) J.set('ms.bench', out.bench);
  return true;
}
document.addEventListener('change', e => {
  if(e.target.id === 'importfile' && e.target.files[0]){
    const r = new FileReader();
    r.onload = () => {
      let ok = false;
      try { ok = importData(JSON.parse(r.result)); } catch(err){ ok = false; }
      if(!ok){ alert('That file didn’t look like a Mat Strong backup. Nothing was changed.'); return; }
      render();
    };
    r.readAsText(e.target.files[0]);
  }
});
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeSheet(); });

/* ───────────────────────── boot ───────────────────────── */
function start(content){
  C = content;
  document.getElementById('lock').hidden = true;
  document.getElementById('app').hidden = false;
  render();
}
document.getElementById('lockform').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('unlockbtn'), err = document.getElementById('lockerr');
  btn.disabled = true; btn.textContent = 'Unlocking…'; err.textContent = '';
  try {
    start(await unlockWithPassword(document.getElementById('pw').value));
  } catch(ex){
    err.textContent = 'That password didn’t work. Try again.';
    btn.disabled = false; btn.textContent = 'Unlock';
  }
});
unlockWithCachedKey().then(c => { if(c) start(c); else document.getElementById('pw').focus(); });
</script>
